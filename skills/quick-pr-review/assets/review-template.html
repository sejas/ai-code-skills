<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Review</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-light.min.css">
<style>
body { max-width: 900px; margin: 0 auto; padding: 2rem; background: #fff; }
.markdown-body { font-size: 15px; }
.toolbar { position: sticky; top: 0; background: #fff; padding: 0.5rem 0 1rem; border-bottom: 1px solid #d0d7de; margin-bottom: 1rem; z-index: 10; display: flex; gap: 0.75rem; align-items: center; }
.btn { padding: 6px 16px; border: 1px solid #d0d7de; border-radius: 6px; background: #f6f8fa; cursor: pointer; font-size: 14px; font-weight: 500; font-family: inherit; }
.btn:hover { background: #eaeef2; }
.btn.copied { background: #2da44e; color: #fff; border-color: #2da44e; }
.footer { text-align: center; color: #656d76; font-size: 13px; padding: 2rem 0; }
@media (max-width: 640px) { body { padding: 1rem; } }
</style>
</head>
<body>
<div class="toolbar">
<button class="btn" id="copy-btn">Copy Markdown</button>
</div>
<article class="markdown-body" id="content"></article>
<div class="footer">Generated by Claude Code &middot; quick-pr-review</div>
<script id="raw" type="text/markdown">
{{REVIEW_MARKDOWN}}
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
<script>
// Content is sanitized through DOMPurify before rendering
var md = document.getElementById('raw').textContent;
var sanitizedHtml = DOMPurify.sanitize(marked.parse(md));
document.getElementById('content').innerHTML = sanitizedHtml;
document.getElementById('copy-btn').addEventListener('click', function() {
    var btn = this;
    navigator.clipboard.writeText(md).then(function() {
        btn.classList.add('copied'); btn.textContent = 'Copied!';
        setTimeout(function() { btn.classList.remove('copied'); btn.textContent = 'Copy Markdown'; }, 2000);
    });
});
</script>
</body>
</html>
